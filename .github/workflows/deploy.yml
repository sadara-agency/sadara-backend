name: Deploy Backend

on:
  workflow_run:
    workflows: ["Backend CI"]
    branches: [main]
    types: [completed]

jobs:
  deploy:
    name: Deploy to Railway
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    steps:
      - name: Trigger Railway deploy
        run: curl -X POST "${{ secrets.RAILWAY_DEPLOY_HOOK }}"
