name: Backend CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

concurrency:
  group: backend-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: 20

jobs:
  # ─── Lint & Type Check ───────────────────────────────────────
  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: ESLint
        run: npm run lint

      - name: TypeScript type check
        run: npx tsc --noEmit

      - name: Prettier format check
        run: npx prettier --check "src/**/*.{ts,json}" || true

  # ─── Security Audit ──────────────────────────────────────────
  security:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: npm audit (high + critical)
        run: npm audit --audit-level=high --omit=dev || true

  # ─── Migration Change Detection ─────────────────────────────
  # Determines whether any migration file changed so migrate-smoke
  # can be skipped on PRs that don't touch migrations (saves ~5 min).
  migration-changes:
    name: Detect Migration Changes
    runs-on: ubuntu-latest
    outputs:
      migrations_changed: ${{ steps.filter.outputs.migrations }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Detect migration file changes
        id: filter
        run: |
          BASE=${{ github.event.pull_request.base.sha || github.event.before }}
          if git diff --name-only "$BASE" HEAD 2>/dev/null | grep -qE \
            '^(src/database/migrations/|src/database/migrationHelpers\.ts|src/database/migrate-cli\.ts|src/config/migrator\.ts)'; then
            echo "migrations=true" >> "$GITHUB_OUTPUT"
          else
            echo "migrations=false" >> "$GITHUB_OUTPUT"
          fi

  # ─── Fresh Migration Smoke ───────────────────────────────────
  # Catches migrations that only fail on an empty schema (e.g. migration 130's
  # NULL id bug). The `test` job runs with --sync-first which can mask these.
  # Skipped on PRs that don't touch migration files (see migration-changes job).
  migrate-smoke:
    name: Fresh Migration Smoke
    runs-on: ubuntu-latest
    needs: [migration-changes]
    if: >
      github.event_name == 'push' ||
      needs.migration-changes.outputs.migrations_changed == 'true'

    # NOTE: Postgres is started manually (not via `services:`) so the image pull
    # can be retried. GitHub pulls `services:` images implicitly with no retry,
    # which makes the job fail outright on a transient Docker Hub timeout/rate-limit.
    env:
      NODE_ENV: test
      POSTGRES_HOST: localhost
      POSTGRES_PORT: 5432
      POSTGRES_DB: SadaraDB
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: testpass
      JWT_SECRET: ci-test-jwt-secret-at-least-32-chars-long
      JWT_EXPIRES_IN: 7d
      JWT_REFRESH_EXPIRES_IN: 30d
      CORS_ORIGIN: http://localhost:3000
      FRONTEND_URL: http://localhost:3000
      BCRYPT_SALT_ROUNDS: 10

    steps:
      - uses: actions/checkout@v4

      - name: Start Postgres (retry pull)
        run: |
          bash ./.github/scripts/docker-pull-retry.sh postgres:17
          docker run -d --name postgres \
            -e POSTGRES_USER=admin \
            -e POSTGRES_PASSWORD=testpass \
            -e POSTGRES_DB=SadaraDB \
            -p 5432:5432 \
            --health-cmd "pg_isready -U admin" \
            --health-interval 5s \
            --health-timeout 5s \
            --health-retries 5 \
            postgres:17
          bash ./.github/scripts/wait-for-healthy.sh postgres

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run migrations on fresh DB (no --sync-first)
        run: npm run migrate

  # ─── Unit & Integration Tests ────────────────────────────────
  test:
    name: Tests
    runs-on: ubuntu-latest

    # NOTE: Postgres + Redis are started manually (not via `services:`) so the
    # image pulls can be retried. GitHub pulls `services:` images implicitly with
    # no retry, which makes the job fail outright on a transient Docker Hub
    # timeout/rate-limit.
    env:
      NODE_ENV: test
      POSTGRES_HOST: localhost
      POSTGRES_PORT: 5432
      POSTGRES_DB: SadaraDB
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: testpass
      JWT_SECRET: ci-test-jwt-secret-at-least-32-chars-long
      JWT_EXPIRES_IN: 7d
      JWT_REFRESH_EXPIRES_IN: 30d
      REDIS_URL: redis://localhost:6379
      CORS_ORIGIN: http://localhost:3000
      FRONTEND_URL: http://localhost:3000
      BCRYPT_SALT_ROUNDS: 10

    steps:
      - uses: actions/checkout@v4

      - name: Start Postgres + Redis (retry pull)
        run: |
          bash ./.github/scripts/docker-pull-retry.sh postgres:17
          bash ./.github/scripts/docker-pull-retry.sh redis:7-alpine
          docker run -d --name postgres \
            -e POSTGRES_USER=admin \
            -e POSTGRES_PASSWORD=testpass \
            -e POSTGRES_DB=SadaraDB \
            -p 5432:5432 \
            --health-cmd "pg_isready -U admin" \
            --health-interval 5s \
            --health-timeout 5s \
            --health-retries 5 \
            postgres:17
          docker run -d --name redis \
            -p 6379:6379 \
            --health-cmd "redis-cli ping" \
            --health-interval 5s \
            --health-timeout 3s \
            --health-retries 5 \
            redis:7-alpine
          bash ./.github/scripts/wait-for-healthy.sh postgres
          bash ./.github/scripts/wait-for-healthy.sh redis

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Sync models & run migrations
        run: npm run migrate -- --sync-first

      - name: Run tests with coverage
        run: npm run test:coverage

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: backend-coverage
          path: coverage/
          retention-days: 14

  # ─── Build ───────────────────────────────────────────────────
  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [lint, test, migrate-smoke]
    if: always() && !failure() && !cancelled()
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Verify build output
        run: |
          test -d dist || (echo "Build failed: dist/ directory not found" && exit 1)
          test -f dist/index.js || (echo "Build failed: dist/index.js not found" && exit 1)
          echo "Build output verified successfully"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: backend-dist
          path: dist/
          retention-days: 7
