# fly.toml app configuration file generated for sadara-backend on 2026-06-29T15:39:03Z
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'sadara-backend'
primary_region = 'fra'
kill_signal = 'SIGINT'
kill_timeout = '30s'

[build]
  dockerfile = 'Dockerfile'

[deploy]
  release_command = 'node dist/database/migrate-cli.js up'

[env]
  NODE_ENV = 'production'
  PORT = '8080'

[http_service]
  internal_port = 4050
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']
  checks = [{ grace_period = '30s', interval = '30s', method = 'GET', path = '/api/health', timeout = '5s' }]
  concurrency = { hard_limit = 250, soft_limit = 200, type = 'requests' }

  [http_service.concurrency]
    type = 'requests'
    hard_limit = 250
    soft_limit = 200

  [[http_service.checks]]
    interval = '30s'
    timeout = '5s'
    grace_period = '30s'
    method = 'GET'
    path = '/api/health'

[[vm]]
  size = 'shared-cpu-1x'
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 1024
