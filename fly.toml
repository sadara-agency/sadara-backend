# Fly.io configuration for Sadara Sports backend.
# Docs: https://fly.io/docs/reference/configuration/

app = "sadara-backend"
primary_region = "fra"  # Frankfurt — closest free region to MENA. Change to "cdg" (Paris) or "ams" (Amsterdam) if you prefer.
kill_signal = "SIGINT"
kill_timeout = "30s"

[build]
  dockerfile = "Dockerfile"

[env]
  NODE_ENV = "production"
  PORT = "8080"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0   # stop when idle to stay within free org limits. Bump to 1 once billing is set up (no cold starts).
  processes = ["app"]

  [http_service.concurrency]
    type = "requests"
    soft_limit = 200
    hard_limit = 250

[[http_service.checks]]
  grace_period = "30s"
  interval = "30s"
  method = "GET"
  timeout = "5s"
  path = "/api/health"

[[vm]]
  size = "shared-cpu-1x"
  memory = "1gb"   # Puppeteer + Sequelize + BullMQ need this. Drop to "512mb" if you don't use PDF generation.
  cpus = 1

[deploy]
  release_command = "node dist/database/migrate-cli.js up"
